<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flourish Coaching CRM</titl
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f7f5f2;--surface:#fff;--surface2:#f0ede8;--border:#e2ddd7;
    --text:#1a1917;--text2:#6b6560;--text3:#a09890;
    --accent:#2d5a3d;--accent-light:#eaf2ec;
    --danger:#c0392b;--danger-light:#fdecea;
    --radius:10px;--shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh;}
  h1,h2,h3{font-family:'DM Serif Display',serif;font-weight:400;}
  .app{display:flex;min-height:100vh;}
  .sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:28px 0;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;}
  .logo{padding:0 24px 28px;border-bottom:1px solid var(--border);margin-bottom:16px;}
  .logo h1{font-size:20px;color:var(--accent);letter-spacing:-0.3px;}
  .logo span{font-size:11px;color:var(--text3);font-family:'DM Sans',sans-serif;letter-spacing:0.5px;text-transform:uppercase;}
  nav{flex:1;padding:0 12px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13.5px;transition:all 0.15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;}
  .nav-item:hover{background:var(--surface2);color:var(--text);}
  .nav-item.active{background:var(--accent-light);color:var(--accent);font-weight:500;}
  .nav-item svg{width:16px;height:16px;flex-shrink:0;}
  .main{flex:1;padding:36px 40px;max-width:1000px;}
  .page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;}
  .page-header h2{font-size:28px;}
  .page-header p{font-size:13px;color:var(--text3);margin-top:2px;}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.15s;border:none;font-weight:500;}
  .btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:#234a31;}
  .btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}.btn-ghost:hover{background:var(--surface2);color:var(--text);}
  .btn-danger{background:var(--danger-light);color:var(--danger);border:1px solid #f5c6c2;}.btn-danger:hover{background:#fbd5d1;}
  .btn-sm{padding:5px 11px;font-size:12px;}
  .btn-blue{background:#e8f0fe;color:#1a56c4;border:1px solid #c5d8fb;}.btn-blue:hover{background:#d2e3fc;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
  .client-card{cursor:pointer;transition:all 0.15s;}.client-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,0.08);}
  .client-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;font-family:'DM Serif Display',serif;flex-shrink:0;}
  .client-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .client-name{font-size:15px;font-weight:500;}
  .client-email{font-size:12px;color:var(--text3);}
  .client-meta{display:flex;gap:8px;flex-wrap:wrap;}
  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;}
  .badge-green{background:var(--accent-light);color:var(--accent);}
  .badge-amber{background:#fef3e2;color:#92610a;}
  .badge-gray{background:var(--surface2);color:var(--text2);}
  .badge-red{background:var(--danger-light);color:var(--danger);}
  .badge-blue{background:#e8f0fe;color:#1a56c4;}
  .badge-purple{background:#f0eeff;color:#5b4fcf;}
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;}
  .stat-label{font-size:11px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text3);margin-bottom:6px;}
  .stat-val{font-size:26px;font-family:'DM Serif Display',serif;color:var(--text);}
  .stat-sub{font-size:11px;color:var(--text3);margin-top:2px;}
  .search-bar{display:flex;gap:10px;margin-bottom:20px;}
  .search-input{flex:1;padding:9px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--text);outline:none;transition:border 0.15s;}
  .search-input:focus{border-color:var(--accent);}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,25,23,0.45);z-index:100;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:14px;padding:28px;width:540px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.18);}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
  .modal-header h3{font-size:20px;}
  .modal-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;line-height:1;padding:4px;}.modal-close:hover{color:var(--text);}
  .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;padding-top:18px;border-top:1px solid var(--border);}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-group{margin-bottom:16px;}
  .form-group label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px;}
  .form-control{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--text);background:var(--surface);outline:none;transition:border 0.15s;}
  .form-control:focus{border-color:var(--accent);}
  textarea.form-control{resize:vertical;min-height:80px;}
  select.form-control{cursor:pointer;}
  .detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  .detail-top{background:var(--accent-light);padding:28px 28px 24px;border-bottom:1px solid var(--border);}
  .detail-top-inner{display:flex;align-items:center;gap:18px;}
  .detail-avatar{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-family:'DM Serif Display',serif;font-weight:400;}
  .detail-name{font-size:24px;color:var(--text);}
  .detail-sub{font-size:13px;color:var(--text2);margin-top:2px;}
  .detail-actions{margin-left:auto;display:flex;gap:8px;}
  .tabs{display:flex;border-bottom:1px solid var(--border);padding:0 24px;background:var(--surface);overflow-x:auto;}
  .tab{padding:13px 16px;font-size:13px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;white-space:nowrap;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500;}
  .tab-content{padding:24px;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);font-weight:500;padding:0 12px 10px;}
  td{padding:11px 12px;border-top:1px solid var(--border);vertical-align:middle;}
  tr:hover td{background:var(--surface2);}
  .empty{text-align:center;padding:48px 20px;color:var(--text3);}
  .empty-icon{font-size:36px;margin-bottom:12px;}
  .empty h3{font-size:16px;color:var(--text2);margin-bottom:6px;font-family:'DM Sans',sans-serif;font-weight:500;}
  .section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .section-title h4{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);}
  .page{display:none;}.page.active{display:block;}
  .goal-item{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-top:1px solid var(--border);}
  .goal-item:first-child{border-top:none;padding-top:0;}
  .goal-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
  .goal-check.done{background:var(--accent);border-color:var(--accent);}
  .goal-check.done::after{content:'';width:8px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block;}
  .goal-text{flex:1;font-size:13.5px;}.goal-text.done{text-decoration:line-through;color:var(--text3);}
  .note-item{border-top:1px solid var(--border);padding:14px 0;}
  .note-item:first-child{border-top:none;padding-top:0;}
  .note-date{font-size:11px;color:var(--text3);margin-bottom:4px;}
  .note-body{font-size:13.5px;white-space:pre-wrap;}
  .sess-row-completed td{color:var(--text3);}
  .sess-row-today{background:#fffbf0!important;}
  .sess-row-auto td:first-child::after{content:' 🤖';font-size:10px;}
  .sess-num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--surface2);font-size:11px;font-weight:500;color:var(--text2);flex-shrink:0;}
  .sess-num-done{background:var(--accent-light);color:var(--accent);}
  .sess-num-today{background:#fef3e2;color:#92610a;}
  .pkg-preview{background:var(--accent-light);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--accent);}
  .prog-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:6px;}
  .prog-fill{height:100%;background:var(--accent);border-radius:3px;}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transform:translateY(8px);transition:all 0.25s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateY(0);}
  .av-0{background:#eaf2ec;color:#2d5a3d;}.av-1{background:#f5ece4;color:#8b5e3c;}
  .av-2{background:#e8eaf6;color:#3949ab;}.av-3{background:#fce4ec;color:#c2185b;}
  .av-4{background:#e0f7fa;color:#00838f;}.av-5{background:#fff8e1;color:#f57f17;}

  /* Webhook / Integration styles */
  .setup-step{display:flex;gap:16px;margin-bottom:24px;}
  .step-num{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;flex-shrink:0;margin-top:2px;}
  .step-body{flex:1;}
  .step-title{font-size:15px;font-weight:500;margin-bottom:6px;}
  .step-desc{font-size:13.5px;color:var(--text2);line-height:1.7;}
  .code-block{background:#1a1917;color:#e8e6e0;padding:14px 16px;border-radius:8px;font-family:'DM Mono',monospace,monospace;font-size:12.5px;margin:10px 0;overflow-x:auto;line-height:1.6;position:relative;}
  .code-copy{position:absolute;top:8px;right:8px;background:rgba(255,255,255,0.1);border:none;color:#e8e6e0;padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .code-copy:hover{background:rgba(255,255,255,0.2);}
  .webhook-url-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin:10px 0;}
  .webhook-url-box code{flex:1;font-size:12px;color:var(--accent);word-break:break-all;font-family:monospace;}
  .ingest-log{max-height:300px;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:8px;}
  .log-item{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;}
  .log-item:last-child{border-bottom:none;}
  .log-item-auto{background:#f0fdf4;}
  .log-time{font-size:11px;color:var(--text3);margin-bottom:3px;}
  .log-msg{color:var(--text2);}
  .log-msg strong{color:var(--text);}
  .tip-box{background:#fffbf0;border:1px solid #f0e0a0;border-radius:8px;padding:12px 14px;font-size:13px;color:#7a5f10;margin:10px 0;}
  .tip-box strong{color:#5a4200;}
  .section-divider{border:none;border-top:1px solid var(--border);margin:28px 0;}

  @media(max-width:700px){
    .sidebar{display:none;}
    .main{padding:20px;}
    .stats-row{grid-template-columns:1fr 1fr;}
    .form-row{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo"><h1>Flourish</h1><span>Coaching CRM</span></div>
    <nav>
      <button class="nav-item active" onclick="showPage('dashboard')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>Dashboard
      </button>
      <button class="nav-item" onclick="showPage('clients')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3"/><path d="M2 13c0-3 2.7-5 6-5s6 2 6 5"/></svg>Clients
      </button>
      <button class="nav-item" onclick="showPage('sessions')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 1v2M11 1v2M2 6h12"/></svg>Sessions
      </button>
      <button class="nav-item" onclick="showPage('payments')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="4" width="14" height="9" rx="2"/><path d="M1 7h14"/></svg>Payments
      </button>
      <button class="nav-item" onclick="showPage('integrations')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="4" cy="8" r="2"/><circle cx="12" cy="4" r="2"/><circle cx="12" cy="12" r="2"/><path d="M6 8h2m2-4H8l-2 4"/><path d="M8 8l2 4"/></svg>Integrations
      </button>
    </nav>
  </aside>

  <main class="main">

    <!-- DASHBOARD -->
    <div id="page-dashboard" class="page active">
      <div class="page-header"><div><h2>Dashboard</h2><p>Welcome back</p></div></div>
      <div class="stats-row" id="dash-stats"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <div class="card"><div class="section-title"><h4>Upcoming Sessions</h4></div><div id="dash-sessions"></div></div>
        <div class="card"><div class="section-title"><h4>Recent Clients</h4></div><div id="dash-clients"></div></div>
      </div>
    </div>

    <!-- CLIENTS -->
    <div id="page-clients" class="page">
      <div id="clients-list-view">
        <div class="page-header">
          <div><h2>Clients</h2><p id="client-count-label"></p></div>
          <button class="btn btn-primary" onclick="openModal('client')">+ Add Client</button>
        </div>
        <div class="search-bar"><input type="text" class="search-input" placeholder="Search clients..." id="client-search" oninput="renderClientsList()"></div>
        <div class="card-grid" id="clients-grid"></div>
      </div>
      <div id="client-detail-view" style="display:none;"></div>
    </div>

    <!-- SESSIONS -->
    <div id="page-sessions" class="page">
      <div class="page-header"><div><h2>Sessions</h2><p id="sessions-count-label"></p></div></div>
      <div class="card" style="padding:0;overflow:hidden;">
        <table><thead><tr><th>#</th><th>Client</th><th>Date & Time</th><th>Type</th><th>Status</th><th>Notes</th></tr></thead>
        <tbody id="sessions-table"></tbody></table>
        <div id="sessions-empty" class="empty" style="display:none;"><div class="empty-icon">📅</div><h3>No sessions yet</h3><p>Add a client with a package to auto-generate sessions.</p></div>
      </div>
    </div>

    <!-- PAYMENTS -->
    <div id="page-payments" class="page">
      <div class="page-header">
        <div><h2>Payments</h2><p id="payments-label"></p></div>
        <button class="btn btn-primary" onclick="openModal('payment')">+ Add Payment</button>
      </div>
      <div class="stats-row" id="payment-stats" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px;"></div>
      <div class="card" style="padding:0;overflow:hidden;">
        <table><thead><tr><th>Client</th><th>Date</th><th>Amount</th><th>Description</th><th>Status</th><th></th></tr></thead>
        <tbody id="payments-table"></tbody></table>
        <div id="payments-empty" class="empty" style="display:none;"><div class="empty-icon">💳</div><h3>No payments yet</h3></div>
      </div>
    </div>

    <!-- INTEGRATIONS -->
    <div id="page-integrations" class="page">
      <div class="page-header"><div><h2>Integrations</h2><p>Connect Dialpad + Zapier for automatic call notes</p></div></div>

      <!-- Status banner -->
      <div id="integration-status-banner" style="margin-bottom:24px;"></div>

      <!-- Tabs -->
      <div style="display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:28px;">
        <button class="tab active" id="itab-btn-setup" onclick="switchIntegTab('setup')" style="background:none;border:none;border-bottom:2px solid var(--accent);color:var(--accent);font-weight:500;padding:10px 18px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;">Setup Guide</button>
        <button class="tab" id="itab-btn-webhook" onclick="switchIntegTab('webhook')" style="background:none;border:none;border-bottom:2px solid transparent;color:var(--text2);padding:10px 18px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;">Webhook Receiver</button>
        <button class="tab" id="itab-btn-log" onclick="switchIntegTab('log')" style="background:none;border:none;border-bottom:2px solid transparent;color:var(--text2);padding:10px 18px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;">Activity Log <span id="log-badge" style="display:none;background:var(--accent);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;margin-left:4px;"></span></button>
      </div>

      <!-- Setup Guide tab -->
      <div id="itab-setup">
        <div class="tip-box" style="margin-bottom:24px;">
          <strong>How this works:</strong> You call clients from Dialpad → the AI transcribes automatically → Zapier catches the summary when the call ends → it sends it here → your CRM matches the phone number and files the note to the right client. Calls over 25 minutes are automatically marked as completed.
        </div>

        <div class="setup-step">
          <div class="step-num">1</div>
          <div class="step-body">
            <div class="step-title">Sign up for Dialpad Pro</div>
            <div class="step-desc">Go to <a href="https://dialpad.com" target="_blank" style="color:var(--accent);">dialpad.com</a> and start a free 14-day trial of the <strong>Pro plan</strong> (required for webhook/CRM integrations). Use it as your coaching business number — clients call this number, you call out from it.</div>
            <div class="tip-box" style="margin-top:8px;">During signup, set your Dialpad number as your primary business number. Under <strong>Settings → AI &amp; Transcription</strong>, turn on <em>Call Transcription</em> and <em>Post-Call Summary</em>.</div>
          </div>
        </div>

        <div class="setup-step">
          <div class="step-num">2</div>
          <div class="step-body">
            <div class="step-title">Make sure every client has their phone number saved in your CRM</div>
            <div class="step-desc">The matching works by phone number. Go to each client's profile here and make sure their phone number is entered exactly as it appears in Dialpad (e.g. <code style="background:var(--surface2);padding:1px 5px;border-radius:4px;">+15550001234</code>). International format with country code is most reliable.</div>
          </div>
        </div>

        <div class="setup-step">
          <div class="step-num">3</div>
          <div class="step-body">
            <div class="step-title">Copy your CRM webhook URL</div>
            <div class="step-desc">Go to the <strong>Webhook Receiver</strong> tab above. Copy the webhook URL shown there — you'll paste it into Zapier in the next step.</div>
          </div>
        </div>

        <div class="setup-step">
          <div class="step-num">4</div>
          <div class="step-body">
            <div class="step-title">Create a free Zapier account &amp; build the Zap</div>
            <div class="step-desc">Go to <a href="https://zapier.com" target="_blank" style="color:var(--accent);">zapier.com</a> and sign up free. Then click <strong>Create Zap</strong> and follow these steps:</div>
            <br>
            <strong style="font-size:13px;">Trigger (the "when"):</strong>
            <div class="code-block">App: Dialpad
Trigger event: Call Completed
Account: [Connect your Dialpad account]
Filter: Run only when "Duration (seconds)" is greater than 0</div>
            <strong style="font-size:13px;">Action (the "what happens"):</strong>
            <div class="code-block">App: Webhooks by Zapier
Action event: POST
URL: [paste your CRM webhook URL here]
Payload type: JSON
Data:
  phone_number  →  {{contact_phone_number}}
  duration      →  {{duration_seconds}}
  transcript    →  {{transcript}}
  summary       →  {{ai_summary}}
  call_date     →  {{start_time}}
  recording_url →  {{recording_url}}</div>
            <div class="tip-box">In Zapier, use the field mapper (the blue + button) to pick the exact Dialpad fields. The field names above match Dialpad Pro's output. Test the Zap with a real call before turning it on.</div>
          </div>
        </div>

        <div class="setup-step">
          <div class="step-num">5</div>
          <div class="step-body">
            <div class="step-title">Test it with a real call</div>
            <div class="step-desc">Make a test call to a client who is in your CRM with a matching phone number. Talk for at least 2 minutes so Dialpad generates a transcript. After you hang up, wait about 60 seconds, then check the <strong>Activity Log</strong> tab — you should see the note appear automatically under that client's Sessions tab.</div>
            <div class="tip-box"><strong>Auto-complete rule:</strong> If the call is <strong>25 minutes or longer</strong>, the session is automatically marked as <em>Completed</em>. Shorter calls file as a note only without changing the session status.</div>
          </div>
        </div>

        <div class="setup-step">
          <div class="step-num">6</div>
          <div class="step-body">
            <div class="step-title">You're done — every call is now automatic</div>
            <div class="step-desc">From now on: call your client from Dialpad → hang up → transcript + AI summary appears in their session notes within ~60 seconds. No manual entry needed. You can view everything in the <strong>Activity Log</strong> tab.</div>
          </div>
        </div>
      </div>

      <!-- Webhook Receiver tab -->
      <div id="itab-webhook" style="display:none;">
        <div class="card" style="margin-bottom:20px;">
          <div style="font-size:15px;font-weight:500;margin-bottom:8px;">Your CRM Webhook URL</div>
          <div class="step-desc" style="margin-bottom:12px;">Copy this URL and paste it into the Zapier "Webhooks by Zapier" action. This is the address Zapier will POST call data to.</div>
          <div class="webhook-url-box">
            <code id="webhook-display-url"></code>
            <button class="btn btn-ghost btn-sm" onclick="copyWebhookUrl()">Copy</button>
          </div>
          <div class="tip-box">This URL is unique to your browser session. Keep this tab open while Zapier sends data — the webhook receiver only works while this page is open. For a permanent solution, consider hosting this on a simple server (ask me how).</div>
        </div>

        <div class="card" style="margin-bottom:20px;">
          <div style="font-size:15px;font-weight:500;margin-bottom:12px;">Test the webhook manually</div>
          <div class="step-desc" style="margin-bottom:12px;">Paste a sample payload below to simulate what Zapier will send. Use a phone number that matches one of your clients.</div>
          <div class="form-group">
            <label>Phone Number (must match a client)</label>
            <input class="form-control" id="test-phone" placeholder="+15550001234">
          </div>
          <div class="form-group">
            <label>Call Duration (seconds)</label>
            <input type="number" class="form-control" id="test-duration" value="1800" min="0">
          </div>
          <div class="form-group">
            <label>Transcript / Summary</label>
            <textarea class="form-control" id="test-transcript" style="min-height:100px;">Today we discussed the client's progress on their delegation goals. Key action items: schedule 1:1s with each direct report by Friday. Client expressed confidence in the new communication framework. Next session: review outcomes of those conversations.</textarea>
          </div>
          <button class="btn btn-primary" onclick="simulateWebhook()">Send Test Payload</button> <button class="btn btn-blue" onclick="fetchNow()" id="fetch-now-btn" style="margin-left:8px;">🔄 Fetch Calls Now</button>
          <div id="test-result" style="display:none;margin-top:14px;padding:12px 14px;border-radius:8px;border:1px solid;font-size:13px;line-height:1.6;"></div>
        </div>

        <div class="card">
          <div style="font-size:15px;font-weight:500;margin-bottom:4px;">Expected JSON format from Zapier</div>
          <div class="step-desc" style="margin-bottom:8px;">This is the exact payload structure your CRM expects:</div>
          <div class="code-block" style="font-size:12px;">{
  "phone_number": "+15550001234",
  "duration": 1920,
  "transcript": "Full call transcript text...",
  "summary": "AI-generated summary...",
  "call_date": "2026-03-19T14:30:00Z",
  "recording_url": "https://dialpad.com/recordings/abc123"
}
<button class="code-copy" onclick="copyCode(this)">copy</button></div>
        </div>
      </div>

      <!-- Activity Log tab -->

          <div style="font-size:15px;font-weight:500;">Incoming call log</div>
          <button class="btn btn-ghost btn-sm" onclick="clearLog()">Clear log</button>
        </div>
        <div id="activity-log-list"></div>
      </div>
    </div>

  </main>
</div>

<script>
// ── State ─────────────────────────────────────────────
let db={clients:[],sessions:[],payments:[],activityLog:[]};
let editingClientId=null,viewingClientId=null;
let activeGoalClientId=null,activeNoteClientId=null;
let activeSessNoteId=null,activeRescheduleId=null;

const AUTO_COMPLETE_MINS = 30;

// ── Persistence ───────────────────────────────────────
function save(){localStorage.setItem('flourish_v4',JSON.stringify(db));}
function load(){try{const d=localStorage.getItem('flourish_v4');if(d)db=JSON.parse(d);}catch(e){}}

// ── Utils ─────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function initials(n){return n.split(' ').map(p=>p[0]).join('').toUpperCase().slice(0,2);}
function avClass(s){let h=0;for(let c of s)h=(h*31+c.charCodeAt(0))&0xffff;return 'av-'+(h%6);}
function fmt$(n){return '$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(d){if(!d)return '—';return new Date(d+'T12:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtShort(d){if(!d)return '—';return new Date(d+'T12:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtTime(t){if(!t)return '';const[h,m]=t.split(':');const hr=+h;return(hr%12||12)+':'+(m||'00')+' '+(hr<12?'AM':'PM');}
function today(){return new Date().toISOString().slice(0,10);}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
function clientName(id){const c=db.clients.find(x=>x.id===id);return c?c.fname+' '+c.lname:'Unknown';}
function addWeeks(ds,w){const d=new Date(ds+'T12:00');d.setDate(d.getDate()+w*7);return d.toISOString().slice(0,10);}
function formatPhoneInput(el){
  // Strip the +1 prefix we added first, so we only work with user-typed digits
  let raw=el.value;
  if(raw.startsWith('+1'))raw=raw.slice(2);
  else if(raw.startsWith('+'))raw=raw.slice(1);
  // Now extract only digits
  let digits=raw.replace(/\D/g,'');
  // Remove leading 1 if user typed it and it makes 11 digits
  if(digits.length>10&&digits[0]==='1')digits=digits.slice(1);
  // Cap at 10 digits
  digits=digits.slice(0,10);
  el.value=digits.length>0?'+1'+digits:'';
}
function normalizePhone(p){
  if(!p)return '';
  let d=p.replace(/[\s\-\(\)\.\+]/g,'');
  if(d.length===11&&d[0]==='1')d=d.slice(1);
  return d;
}

function generateSessions(clientId,startDate,time,count,type,duration){
  return Array.from({length:count},(_,i)=>({
    id:uid(),clientId,sessionNum:i+1,totalSessions:count,
    date:addWeeks(startDate,i),originalDate:addWeeks(startDate,i),
    time:time||'10:00',type:type||'1:1 Coaching',duration:duration||'60',
    notes:'',status:'scheduled',rescheduled:false,
    autoFiled:false,recordingUrl:'',callDuration:0
  }));
}

// ── Navigation ────────────────────────────────────────
function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelector(`[onclick="showPage('${page}')"]`).classList.add('active');
  if(page==='dashboard')renderDashboard();
  if(page==='clients'){renderClientsList();document.getElementById('clients-list-view').style.display='';document.getElementById('client-detail-view').style.display='none';}
  if(page==='sessions')renderSessionsPage();
  if(page==='payments')renderPayments();
  if(page==='integrations')renderIntegrations();
}

// ── Modals ────────────────────────────────────────────
function openModal(type){
  if(type==='payment'){const sel=document.getElementById('p-client');sel.innerHTML=db.clients.map(c=>`<option value="${c.id}">${c.fname} ${c.lname}</option>`).join('');document.getElementById('p-date').valueAsDate=new Date();}
  if(type==='client'&&!editingClientId){
    ['c-fname','c-lname','c-email','c-phone','c-notes'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('c-status').value='Active';
    document.getElementById('c-pkg-size').value='24';
    document.getElementById('c-start-time').value='10:00';
    document.getElementById('c-duration').value='60';
    document.getElementById('c-stype').value='1:1 Coaching';
    document.getElementById('c-start-date').valueAsDate=new Date();
    document.getElementById('custom-size-row').style.display='none';
    document.getElementById('pkg-section').style.display='';
    updatePkgPreview();
  }
  document.getElementById('modal-'+type).classList.add('open');
}
function closeModal(type){
  document.getElementById('modal-'+type).classList.remove('open');
  if(type==='client'){editingClientId=null;document.getElementById('modal-client-title').textContent='New Client';}
}
function updatePkgPreview(){
  const sv=document.getElementById('c-pkg-size').value;
  const isCustom=sv==='custom';
  document.getElementById('custom-size-row').style.display=isCustom?'':'none';
  const count=isCustom?(+document.getElementById('c-pkg-custom').value||1):+sv;
  const startDate=document.getElementById('c-start-date').value;
  const preview=document.getElementById('pkg-preview');
  if(!startDate||!count){preview.style.display='none';return;}
  const end=addWeeks(startDate,count-1);
  const day=new Date(startDate+'T12:00').toLocaleDateString('en-US',{weekday:'long'});
  preview.style.display='';
  preview.innerHTML=`<strong>${count} sessions</strong> every ${day} &nbsp;·&nbsp; ${fmtDate(startDate)} → ${fmtDate(end)}`;
}

// ── Clients CRUD ──────────────────────────────────────
function saveClient(){
  const fname=document.getElementById('c-fname').value.trim();
  const lname=document.getElementById('c-lname').value.trim();
  if(!fname){alert('Please enter a first name.');return;}
  if(editingClientId){
    const c=db.clients.find(x=>x.id===editingClientId);
    Object.assign(c,{fname,lname,email:document.getElementById('c-email').value.trim(),phone:document.getElementById('c-phone').value.trim(),status:document.getElementById('c-status').value,notes:document.getElementById('c-notes').value.trim()});
    save();toast('Client updated');closeModal('client');renderClientsList();renderClientDetail(editingClientId);
    return;
  }
  const sv=document.getElementById('c-pkg-size').value;
  const isCustom=sv==='custom';
  const count=isCustom?(+document.getElementById('c-pkg-custom').value||1):+sv;
  const startDate=document.getElementById('c-start-date').value;
  const time=document.getElementById('c-start-time').value;
  const duration=document.getElementById('c-duration').value;
  const stype=document.getElementById('c-stype').value;
  if(!startDate){alert('Please select a first session date.');return;}
  const id=uid();
  db.clients.push({id,fname,lname,email:document.getElementById('c-email').value.trim(),phone:document.getElementById('c-phone').value.trim(),status:document.getElementById('c-status').value,packageSize:count,notes:document.getElementById('c-notes').value.trim(),goals:[],noteHistory:[],createdAt:new Date().toISOString()});
  db.sessions=db.sessions.concat(generateSessions(id,startDate,time,count,stype,duration));
  save();toast(`Client added · ${count} sessions scheduled`);closeModal('client');renderClientsList();
}
function deleteClient(id){
  if(!confirm('Delete this client and all their sessions and payments?'))return;
  db.clients=db.clients.filter(c=>c.id!==id);
  db.sessions=db.sessions.filter(s=>s.clientId!==id);
  db.payments=db.payments.filter(p=>p.clientId!==id);
  save();toast('Client deleted');
  document.getElementById('clients-list-view').style.display='';
  document.getElementById('client-detail-view').style.display='none';
  renderClientsList();
}
function editClient(id){
  const c=db.clients.find(x=>x.id===id);
  editingClientId=id;
  document.getElementById('modal-client-title').textContent='Edit Client';
  document.getElementById('c-fname').value=c.fname;
  document.getElementById('c-lname').value=c.lname;
  document.getElementById('c-email').value=c.email||'';
  document.getElementById('c-phone').value=c.phone||'';
  document.getElementById('c-status').value=c.status;
  document.getElementById('c-notes').value=c.notes||'';
  document.getElementById('pkg-section').style.display='none';
  openModal('client');
}

// ── Clients Render ────────────────────────────────────
function renderClientsList(){
  const q=(document.getElementById('client-search').value||'').toLowerCase();
  const filtered=db.clients.filter(c=>(c.fname+' '+c.lname+' '+(c.email||'')).toLowerCase().includes(q));
  document.getElementById('client-count-label').textContent=db.clients.length+' client'+(db.clients.length!==1?'s':'');
  const grid=document.getElementById('clients-grid');
  if(!filtered.length){grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">👤</div><h3>${db.clients.length?'No matches':'No clients yet'}</h3><p>${db.clients.length?'Try a different search.':'Click "+ Add Client" to get started.'}</p></div>`;return;}
  grid.innerHTML=filtered.map(c=>{
    const cs=db.sessions.filter(s=>s.clientId===c.id);
    const done=cs.filter(s=>s.status==='completed').length;
    const total=cs.length;
    const pct=total?Math.round(done/total*100):0;
    const paid=db.payments.filter(p=>p.clientId===c.id&&p.status==='Paid').reduce((a,p)=>a+Number(p.amount),0);
    const sb={Active:'badge-green',Prospective:'badge-amber',Paused:'badge-gray',Completed:'badge-gray'}[c.status]||'badge-gray';
    const next=cs.filter(s=>s.status==='scheduled'&&s.date>=today()).sort((a,b)=>a.date.localeCompare(b.date))[0];
    const hasPhone=!!c.phone;
    return `<div class="card client-card" onclick="viewClient('${c.id}')">
      <div class="client-header">
        <div class="client-avatar ${avClass(c.id)}">${initials(c.fname+' '+c.lname)}</div>
        <div><div class="client-name">${c.fname} ${c.lname}</div><div class="client-email">${c.email||'No email'}</div></div>
      </div>
      <div class="client-meta">
        <span class="badge ${sb}">${c.status}</span>
        ${total?`<span class="badge badge-gray">${total} sessions</span>`:''}
        ${hasPhone?`<span class="badge badge-blue" title="${c.phone}">Auto-notes ✓</span>`:'<span class="badge badge-amber">Add phone #</span>'}
      </div>
      ${total?`<div style="margin-top:12px;"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:4px;"><span>Progress</span><span>${done}/${total}</span></div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div></div>`:''}
      <div style="display:flex;gap:16px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">

function confirmReschedule(){
  const s=db.sessions.find(x=>x.id===activeRescheduleId);
  if(!s)return;
  const nd=document.getElementById('rs-date').value;
  if(!nd){alert('Please select a date.');return;}
  // Calculate how many days the session is being shifted
  const oldDate=new Date(s.date+'T12:00');
  const newDate=new Date(nd+'T12:00');
  const diffMs=newDate-oldDate;
  const diffDays=Math.round(diffMs/(1000*60*60*24));
  // Shift this session and all future sessions for this client by the same amount
  const clientSessions=db.sessions
    .filter(x=>x.clientId===s.clientId&&x.sessionNum>=s.sessionNum&&x.status!=='completed'&&x.status!=='cancelled');
  clientSessions.forEach(x=>{
    const d=new Date(x.date+'T12:00');
    d.setDate(d.getDate()+diffDays);
    x.date=d.toISOString().slice(0,10);
  });
  s.time=document.getElementById('rs-time').value;
  s.rescheduled=true;s.status='rescheduled';
  save();closeModal('reschedule');toast('Session rescheduled — '+clientSessions.length+' future sessions shifted');
  if(viewingClientId)renderClientDetail(viewingClientId);
  renderSessionsPage();
}

// ── ⭐ WEBHOOK RECEIVER ───────────────────────────────
// This is the core auto-filing logic. It receives a payload
// (phone_number, duration, transcript, summary, call_date, recording_url)
// matches the phone number to a client, finds their next scheduled session,
// files the notes, and auto-completes if call >= AUTO_COMPLETE_MINS.

function processWebhookPayload(payload){
  const phone = normalizePhone(payload.phone_number||payload.phone||'');
  const durationSecs = Number(payload.duration||payload.duration_seconds||0);
  const transcript = payload.transcript||'';
  const summary = payload.summary||payload.ai_summary||'';
  const recordingUrl = payload.recording_url||payload.recording||'';
  const callDate = payload.call_date||payload.start_time||new Date().toISOString();
  const durationMins = durationSecs/60;

  // Match client by phone number
  const client = db.clients.find(c=>normalizePhone(c.phone)===phone);
  if(!client){
    logActivity({type:'error',msg:`No client found for phone number ${phone||'(unknown)'}`,time:new Date().toISOString()});
    return {success:false,error:`No client found for phone number: ${phone}`};
  }

  // Find next scheduled session for this client (closest upcoming or today)
  const clientSessions = db.sessions
    .filter(s=>s.clientId===client.id&&s.status==='scheduled')
    .sort((a,b)=>a.date.localeCompare(b.date));
  
  // Prefer today's session, otherwise the next upcoming one
  const todayStr=today();
  let targetSession = clientSessions.find(s=>s.date===todayStr) || clientSessions[0];

  // Build notes text
  const noteText = [
    summary?`📋 AI Summary:\n${summary}`:'',
    transcript?`\n📝 Full Transcript:\n${transcript}`:'',
    recordingUrl?`\n🔗 Recording: ${recordingUrl}`:''
  ].filter(Boolean).join('\n');

  if(targetSession){
    targetSession.notes = noteText||targetSession.notes;
    targetSession.autoFiled = true;
    targetSession.recordingUrl = recordingUrl||'';
    targetSession.callDuration = durationSecs;
    // Auto-complete if call >= 25 minutes
    const autoCompleted = durationMins >= AUTO_COMPLETE_MINS;
    if(autoCompleted) targetSession.status='completed';
    save();
    const msg = `Auto-filed notes for ${client.fname} ${client.lname} → Session ${targetSession.sessionNum}${autoCompleted?' (auto-completed, '+Math.round(durationMins)+' min call)':''}`;
    logActivity({type:autoCompleted?'autocomplete':'filed',msg,time:new Date().toISOString(),clientId:client.id,sessId:targetSession.id});
    toast(msg);
    if(viewingClientId===client.id)renderClientDetail(client.id);
    renderSessionsPage();
    renderDashboard();
    return {success:true,client:client.fname+' '+client.lname,session:targetSession.sessionNum,autoCompleted};
  } else {
    // No scheduled session — add as a history note instead
    if(!client.noteHistory)client.noteHistory=[];
    client.noteHistory.push({text:noteText,date:todayStr});
    save();
    const msg=`No scheduled session found for ${client.fname} ${client.lname} — filed as history note`;
    logActivity({type:'note',msg,time:new Date().toISOString(),clientId:client.id});
    toast(msg);
    return {success:true,client:client.fname+' '+client.lname,filedAs:'history note'};
  }
}

}

// ── Cloudflare Worker Polling ─────────────────────────
const WORKER_URL = 'https://coaching-crm-relay.prosperingmentor.workers.dev';

function checkUrlWebhook(){ /* legacy stub — polling handles real calls now */ }

async function pollWorker(){
  try {
    const res = await fetch(WORKER_URL+'/poll');
    if(!res.ok) return;
    const items = await res.json();
    if(items && items.length){
      items.forEach(payload => {
        const result = processWebhookPayload(payload);
        if(result.success){
          toast('📞 Auto-filed: '+result.client+' → Session '+result.session);
        }
      });
    }
  } catch(e) {
    // silently ignore network errors
  }
}

setInterval(pollWorker, 86400000);
pollWorker(); // run once immediately on load

  document.getElementById('sessions-count-label').textContent=db.sessions.length+' sessions across '+db.clients.length+' clients';
  const tbody=document.getElementById('sessions-table');
  if(!sorted.length){tbody.innerHTML='';document.getElementById('sessions-empty').style.display='';return;}
  document.getElementById('sessions-empty').style.display='none';
  tbody.innerHTML=sorted.map(s=>{
    const isToday=s.date===t;
    const rowCls=s.status==='completed'?'sess-row-completed':isToday?'sess-row-today':'';
    const numCls=s.status==='completed'?'sess-num-done':isToday?'sess-num-today':'';
    const bdg=s.status==='completed'?'badge-green':s.status==='cancelled'?'badge-red':s.status==='rescheduled'?'badge-blue':isToday?'badge-amber':'badge-gray';
    const lbl=s.status==='completed'?'Done':s.status==='cancelled'?'Cancelled':s.status==='rescheduled'?'Rescheduled':isToday?'Today':'Scheduled';
    const autoTag=s.autoFiled?` <span class="badge badge-purple" style="font-size:10px;">🤖</span>`:'';
    return `<tr class="${rowCls}">
      <td><span class="sess-num ${numCls}">${s.sessionNum}</span><span style="font-size:10px;color:var(--text3);"> /${s.totalSessions}</span></td>
      <td style="font-weight:500;">${clientName(s.clientId)}</td>
      <td>${fmtShort(s.date)} <span style="color:var(--text3);">${fmtTime(s.time)}</span></td>
      <td><span class="badge badge-gray">${s.type}</span></td>
      <td><span class="badge ${bdg}">${lbl}</span>${autoTag}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2);">${s.notes||'—'}</td>
    </tr>`;
  }).join('');
}

// ── Payments ──────────────────────────────────────────
function savePayment(){
  const clientId=document.getElementById('p-client').value;
  const amount=document.getElementById('p-amount').value;
  const date=document.getElementById('p-date').value;
  if(!clientId||!amount||!date){alert('Please fill in all required fields.');return;}
  db.payments.push({id:uid(),clientId,amount,date,desc:document.getElementById('p-desc').value.trim(),status:document.getElementById('p-status').value});
  save();closeModal('payment');toast('Payment added');
  renderPayments();if(viewingClientId)renderClientDetail(viewingClientId);
}
function deletePayment(id,clientId){
  db.payments=db.payments.filter(p=>p.id!==id);
  save();toast('Payment deleted');renderPayments();if(clientId)renderClientDetail(clientId);
}
function renderPayments(){
  const sorted=[...db.payments].sort((a,b)=>b.date.localeCompare(a.date));
  const tbody=document.getElementById('payments-table');
  const tp=db.payments.filter(p=>p.status==='Paid').reduce((a,p)=>a+Number(p.amount),0);
  const tpe=db.payments.filter(p=>p.status==='Pending').reduce((a,p)=>a+Number(p.amount),0);
  const tod=db.payments.filter(p=>p.status==='Overdue').reduce((a,p)=>a+Number(p.amount),0);
  document.getElementById('payment-stats').innerHTML=`
    <div class="stat-card"><div class="stat-label">Total Received</div><div class="stat-val" style="font-size:20px;">${fmt$(tp)}</div></div>
    <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-val" style="font-size:20px;color:#92610a;">${fmt$(tpe)}</div></div>
    <div class="stat-card"><div class="stat-label">Overdue</div><div class="stat-val" style="font-size:20px;color:var(--danger);">${fmt$(tod)}</div></div>`;
  document.getElementById('payments-label').textContent=db.payments.length+' record'+(db.payments.length!==1?'s':'');
  if(!sorted.length){tbody.innerHTML='';document.getElementById('payments-empty').style.display='';return;}
  document.getElementById('payments-empty').style.display='none';
  tbody.innerHTML=sorted.map(p=>`<tr>
    <td><strong>${clientName(p.clientId)}</strong></td><td>${fmtDate(p.date)}</td>
    <td style="font-weight:500;">${fmt$(p.amount)}</td><td style="color:var(--text2);">${p.desc||'—'}</td>
    <td><span class="badge ${p.status==='Paid'?'badge-green':p.status==='Overdue'?'badge-red':'badge-amber'}">${p.status}</span></td>
    <td><button class="btn btn-ghost btn-sm" onclick="deletePayment('${p.id}',null)">✕</button></td>
  </tr>`).join('');
}

// ── Goals & Notes ─────────────────────────────────────
function openGoalModal(id){activeGoalClientId=id;openModal('goal');}
function openNoteModal(id){activeNoteClientId=id;openModal('note');}
function saveGoal(){
  const text=document.getElementById('goal-text').value.trim();if(!text)return;
  const c=db.clients.find(x=>x.id===activeGoalClientId);if(!c.goals)c.goals=[];
  c.goals.push({text,targetDate:document.getElementById('goal-date').value,done:false});
  save();closeModal('goal');toast('Goal added');renderClientDetail(activeGoalClientId);
}
function toggleGoal(cid,i){const c=db.clients.find(x=>x.id===cid);c.goals[i].done=!c.goals[i].done;save();renderClientDetail(cid);}
function deleteGoal(cid,i){const c=db.clients.find(x=>x.id===cid);c.goals.splice(i,1);save();renderClientDetail(cid);}
function saveNote(){
  const text=document.getElementById('note-text').value.trim();if(!text)return;
  const c=db.clients.find(x=>x.id===activeNoteClientId);if(!c.noteHistory)c.noteHistory=[];
  c.noteHistory.push({text,date:today()});
  save();closeModal('note');toast('Note saved');renderClientDetail(activeNoteClientId);
}

// ── Dashboard ─────────────────────────────────────────
function renderDashboard(){
  const t=today();
  const rev=db.payments.filter(p=>p.status==='Paid').reduce((a,p)=>a+Number(p.amount),0);
  const pend=db.payments.filter(p=>p.status==='Pending').reduce((a,p)=>a+Number(p.amount),0);
  const upcoming=db.sessions.filter(s=>s.status==='scheduled'&&s.date>=t).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const todaySess=db.sessions.filter(s=>s.date===t);
  const autoFiled=db.sessions.filter(s=>s.autoFiled).length;
  document.getElementById('dash-stats').innerHTML=`
    <div class="stat-card"><div class="stat-label">Active Clients</div><div class="stat-val">${db.clients.filter(c=>c.status==='Active').length}</div><div class="stat-sub">${db.clients.length} total</div></div>
    <div class="stat-card"><div class="stat-label">Today</div><div class="stat-val">${todaySess.length}</div><div class="stat-sub">session${todaySess.length!==1?'s':''}</div></div>
    <div class="stat-card"><div class="stat-label">Revenue</div><div class="stat-val" style="font-size:20px;">${fmt$(rev)}</div><div class="stat-sub">Pending: ${fmt$(pend)}</div></div>
    <div class="stat-card"><div class="stat-label">Auto-filed</div><div class="stat-val">${autoFiled}</div><div class="stat-sub">call notes</div></div>`;
  document.getElementById('dash-sessions').innerHTML=upcoming.slice(0,5).map(s=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid var(--border);">
      <div>
        <div style="display:flex;align-items:center;gap:7px;">
          <span class="sess-num" style="width:22px;height:22px;font-size:10px;">${s.sessionNum}</span>
          <span style="font-size:13.5px;font-weight:500;">${clientName(s.clientId)}</span>
        </div>
        <div style="font-size:11px;color:var(--text3);padding-left:29px;margin-top:1px;">Session ${s.sessionNum} of ${s.totalSessions}</div>
      </div>
      <div style="text-align:right;font-size:12px;color:var(--text2);">${fmtShort(s.date)}<br>${fmtTime(s.time)}</div>
    </div>`).join('')||'<p style="color:var(--text3);font-size:13px;padding-top:8px;">No upcoming sessions.</p>';
  document.getElementById('dash-clients').innerHTML=[...db.clients].reverse().slice(0,4).map(c=>`
    <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--border);cursor:pointer;" onclick="showPage('clients');viewClient('${c.id}')">
      <div class="client-avatar ${avClass(c.id)}" style="width:32px;height:32px;font-size:12px;">${initials(c.fname+' '+c.lname)}</div>
      <div style="flex:1"><div style="font-size:13.5px;font-weight:500;">${c.fname} ${c.lname}</div><div style="font-size:12px;color:var(--text3);">${c.status}${c.phone?' · Auto-notes on':''}</div></div>
    </div>`).join('')||'<p style="color:var(--text3);font-size:13px;padding-top:8px;">No clients yet.</p>';
}

document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{
